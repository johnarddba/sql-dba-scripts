- name: Create database in SQL Server
  hosts: sqlserver
  vars_files:
    - vars.yml

  tasks:
    - name: Create database in SQL Server
      community.general.mssql_db:
        name: "{{ db_name }}"
        state: present
        login_user: "{{ db_user }}"
        login_password: "{{ db_password }}"
        login_host: "{{ db_server }}"
  
